<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veegtracker Pro - Site Structuur Preview</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f6f1e8;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2a1f;
    }
    .frame {
      max-width: 1520px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d7c8af;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(62, 49, 28, 0.12);
      overflow: hidden;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid #eadfcd;
      background: linear-gradient(135deg, #fffaf2, #f3eadf);
    }
    .header h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }
    .header p {
      margin: 0;
      color: #5b675b;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="header">
      <h1>Veegtracker Pro - Siteschema</h1>
      <p>Preview van de opbouw en navigatiestromen van het dashboard.</p>
    </div>
    <img src="./site-structuur.svg" alt="Schematische tekening van Veegtracker Pro" />
  </div>
</body>
</html>
