<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .bg { fill: #f6f1e8; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f2a1f; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #526052; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #213321; letter-spacing: 1px; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #172217; }
      .small { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #425042; }
      .tiny { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #5b675b; }
      .shell { fill: #fffdf8; stroke: #d7c8af; stroke-width: 2; rx: 28; }
      .panel { fill: #ffffff; stroke: #d7c8af; stroke-width: 2; rx: 22; }
      .tab { fill: #eef5ea; stroke: #9ab38c; stroke-width: 2; rx: 16; }
      .tab-ai { fill: #fff0e7; stroke: #d4875c; stroke-width: 2; rx: 16; }
      .detail { fill: #f8f7ff; stroke: #a4a0d4; stroke-width: 2; rx: 18; }
      .action { fill: #eaf3ff; stroke: #6e98cf; stroke-width: 2; rx: 18; }
      .data { fill: #f3ebe3; stroke: #bf9f7a; stroke-width: 2; rx: 18; }
      .arrow { stroke: #4e5d4e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .soft { stroke: #8d9c8d; stroke-width: 2.5; fill: none; marker-end: url(#arrowheadSoft); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4e5d4e" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8d9c8d" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980" />

  <text class="title" x="70" y="70">Veegtracker Pro - Schematische site-opbouw</text>
  <text class="subtitle" x="70" y="105">De webinterface is een single-page dashboard: 1 HTML-pagina met tabs, overlays en acties.</text>

  <rect class="shell" x="60" y="140" width="1480" height="760" rx="28" />
  <text class="section" x="90" y="180">HOOFDSTRUCTUUR</text>

  <rect class="panel" x="90" y="205" width="400" height="650" rx="22" />
  <text class="label" x="120" y="245">Sidebar</text>
  <text class="small" x="120" y="272">Lijstweergave en tabnavigatie</text>

  <rect class="tab" x="120" y="305" width="155" height="78" rx="16" />
  <text class="label" x="150" y="350">Routes</text>
  <text class="tiny" x="142" y="371">Klik toont routes-lijst</text>

  <rect class="tab" x="300" y="305" width="155" height="78" rx="16" />
  <text class="label" x="321" y="350">Meldingen</text>
  <text class="tiny" x="318" y="371">Klik toont POI-lijst</text>

  <rect class="tab" x="120" y="410" width="155" height="78" rx="16" />
  <text class="label" x="163" y="455">Taken</text>
  <text class="tiny" x="141" y="476">Klik toont taken-lijst</text>

  <rect class="tab-ai" x="300" y="410" width="155" height="78" rx="16" />
  <text class="label" x="315" y="455">AI Agent</text>
  <text class="tiny" x="318" y="476">Klik toont suggesties</text>

  <rect class="panel" x="120" y="530" width="335" height="145" rx="20" />
  <text class="label" x="145" y="568">Dynamische lijst</text>
  <text class="small" x="145" y="598">`renderList()` vult hier de items</text>
  <text class="tiny" x="145" y="626">Per tab andere inhoud, zelfde pagina</text>
  <text class="tiny" x="145" y="650">Klik op item opent details-overlay</text>

  <rect class="data" x="120" y="705" width="335" height="110" rx="20" />
  <text class="label" x="145" y="742">Live data</text>
  <text class="small" x="145" y="770">Firestore listeners voor routes, pois en tasks</text>
  <text class="tiny" x="145" y="794">AI-suggesties worden afgeleid van meldingen</text>

  <rect class="panel" x="560" y="205" width="520" height="650" rx="22" />
  <text class="label" x="590" y="245">Kaartgedeelte</text>
  <text class="small" x="590" y="272">Leaflet-kaart met markers en focussen op locaties</text>

  <rect class="action" x="595" y="315" width="265" height="110" rx="18" />
  <text class="label" x="622" y="355">Leaflet-kaart</text>
  <text class="small" x="622" y="384">OpenStreetMap basislaag</text>
  <text class="tiny" x="622" y="406">Toont POI-markers uit meldingen</text>

  <rect class="action" x="595" y="470" width="265" height="118" rx="18" />
  <text class="label" x="620" y="510">Snelle taak maken</text>
  <text class="small" x="620" y="540">Knop opent prompt voor taakomschrijving</text>
  <text class="tiny" x="620" y="562">Na bevestigen wordt taak direct aangemaakt</text>

  <rect class="detail" x="890" y="315" width="155" height="105" rx="18" />
  <text class="label" x="928" y="355">Route</text>
  <text class="tiny" x="914" y="382">Details in overlay</text>

  <rect class="detail" x="890" y="445" width="155" height="105" rx="18" />
  <text class="label" x="914" y="485">Melding</text>
  <text class="tiny" x="906" y="512">Details + zoom kaart</text>

  <rect class="detail" x="890" y="575" width="155" height="105" rx="18" />
  <text class="label" x="931" y="615">Taak</text>
  <text class="tiny" x="904" y="642">Details + verwijderen</text>

  <rect class="detail" x="890" y="705" width="155" height="105" rx="18" />
  <text class="label" x="913" y="745">AI suggestie</text>
  <text class="tiny" x="902" y="772">Details + accepteren</text>

  <rect class="panel" x="1140" y="205" width="360" height="650" rx="22" />
  <text class="label" x="1170" y="245">Resultaat / acties</text>
  <text class="small" x="1170" y="272">Wat er gebeurt na een klik of actie</text>

  <rect class="data" x="1170" y="320" width="300" height="120" rx="18" />
  <text class="label" x="1200" y="360">Nieuwe taak</text>
  <text class="small" x="1200" y="388">Aangemaakt via AI-suggestie</text>
  <text class="tiny" x="1200" y="410">of via "Snelle taak maken"</text>

  <rect class="data" x="1170" y="485" width="300" height="110" rx="18" />
  <text class="label" x="1200" y="525">Taak verwijderd</text>
  <text class="small" x="1200" y="553">Vanuit taakdetails in overlay</text>

  <rect class="data" x="1170" y="640" width="300" height="120" rx="18" />
  <text class="label" x="1200" y="680">Kaart focus</text>
  <text class="small" x="1200" y="708">Bij melding wordt ingezoomd op locatie</text>
  <text class="tiny" x="1200" y="730">Markers worden live bijgewerkt</text>

  <path class="arrow" d="M455 344 C520 344, 520 344, 595 344" />
  <path class="arrow" d="M455 449 C540 449, 540 500, 595 500" />
  <path class="arrow" d="M455 449 C620 449, 720 497, 890 497" />
  <path class="arrow" d="M455 449 C680 449, 760 742, 890 757" />
  <path class="arrow" d="M455 449 C600 449, 780 337, 890 367" />
  <path class="arrow" d="M455 554 C650 554, 730 627, 890 627" />
  <path class="arrow" d="M860 525 C940 525, 1030 380, 1170 380" />
  <path class="arrow" d="M1045 757 C1100 757, 1105 380, 1170 380" />
  <path class="arrow" d="M1045 627 C1100 627, 1105 540, 1170 540" />
  <path class="arrow" d="M1045 497 C1105 497, 1110 700, 1170 700" />
  <path class="arrow" d="M860 370 C980 370, 1050 700, 1170 700" />

  <path class="soft dashed" d="M287 705 C287 680, 287 665, 287 675" />
  <path class="soft" d="M455 760 C520 760, 520 760, 1170 760" />

  <text class="section" x="90" y="940">Leespad: index.html -> tab kiezen -> lijstitem kiezen -> details-overlay -> actie of kaartfocus</text>
</svg>
