<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veegtracker Pro - Cloud Dashboard</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --primary: #1a237e; --secondary: #c51162; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #333; }

        /* Sidebar */
        #sidebar { width: 380px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        #header { padding: 25px; background: var(--primary); color: white; }
        .tabs { display: flex; background: #eee; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { background: white; color: var(--primary); border-top: 3px solid var(--primary); }

        .content-area { flex: 1; overflow-y: auto; }
        .list-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; position: relative; }
        .list-item:hover { background: #f0f4ff; }
        .item-title { font-weight: bold; display: block; margin-bottom: 4px; }
        .item-sub { font-size: 12px; color: #888; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; position: absolute; right: 20px; top: 20px; }

        /* Stats Bar */
        #stats-bar { display: flex; padding: 15px; background: #fff; gap: 10px; border-bottom: 1px solid #ddd; }
        .stat-card { flex: 1; padding: 10px; background: var(--bg); border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-lbl { font-size: 10px; text-transform: uppercase; color: #888; }

        /* Map & Overlay */
        #map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        .floating-action { position: absolute; bottom: 30px; left: 30px; z-index: 1001; }
        #btn-new-task { background: var(--secondary); color: white; border: none; padding: 15px 25px; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* Details Overlay */
        #details { position: absolute; top: 20px; right: 20px; width: 320px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; display: none; }
        .close-btn { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="header">
            <h2 style="margin:0"><i class="fas fa-truck-pickup"></i> Veegtracker Pro</h2>
            <p style="margin:5px 0 0; opacity:0.8; font-size: 14px;">Centrale Meldkamer Live</p>
        </div>

        <div id="stats-bar">
            <div class="stat-card">
                <span class="stat-val" id="stat-routes">0</span>
                <span class="stat-lbl">Routes</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="stat-pois">0</span>
                <span class="stat-lbl">Meldingen</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="stat-tasks">0</span>
                <span class="stat-lbl">Taken</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('routes')">ROUTES</div>
            <div class="tab" onclick="switchTab('pois')">MELDINGEN</div>
            <div class="tab" onclick="switchTab('tasks')">TAKEN</div>
            <div class="tab" onclick="switchTab('ai')" style="color:var(--secondary)"><i class="fas fa-robot"></i> AI AGENT</div>
        </div>

        <div class="content-area" id="list-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>

        <div class="floating-action">
            <button id="btn-new-task" onclick="showTaskDialog()">
                <i class="fas fa-plus"></i> SNELLE TAAK MAKEN
            </button>
        </div>

        <div id="details">
            <span class="close-btn" onclick="hideDetails()">&times;</span>
            <h3 id="det-name" style="margin-top:0">Details</h3>
            <hr border="0" style="height:1px; background:#eee">
            <div id="det-content">
                <!-- Dynamic Details -->
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDXUEaD1vkgpaIN2NYtXxkQrA_VcgcTnbU",
            authDomain: "veegtrackerpro-c03ae.firebaseapp.com",
            projectId: "veegtrackerpro-c03ae",
            storageBucket: "veegtrackerpro-c03ae.firebasestorage.app",
            messagingSenderId: "534557233635",
            appId: "1:534557233635:android:ca91a08ee12415526c50d6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let map = L.map('map').setView([52.0907, 5.1214], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let currentTab = 'routes';
        let dataStore = { routes: [], pois: [], tasks: [], ai: [] };
        let markers = [];

        // Icons
        const truckIcon = L.divIcon({ html: '<i class="fas fa-truck-monster fa-2x" style="color:#1a237e"></i>', iconSize: [30, 30], className: 'map-icon' });
        const weedIcon = L.divIcon({ html: '<i class="fas fa-seedling fa-2x" style="color:#2e7d32"></i>', iconSize: [30, 30], className: 'map-icon' });
        const alertIcon = L.divIcon({ html: '<i class="fas fa-exclamation-triangle fa-2x" style="color:#c62828"></i>', iconSize: [30, 30], className: 'map-icon' });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (window.event) window.event.target.classList.add('active');
            renderList();
        }

        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        // Live Data Listeners
        db.collection("routes").onSnapshot(s => {
            dataStore.routes = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('stat-routes').innerText = dataStore.routes.length;
            if(currentTab === 'routes') renderList();
        });

        db.collection("pois").onSnapshot(s => {
            dataStore.pois = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('stat-pois').innerText = dataStore.pois.length;
            updateAiSuggestions();
            if(currentTab === 'pois' || currentTab === 'ai') renderList();
            updateMapMarkers();
        });

        db.collection("tasks").onSnapshot(s => {
            dataStore.tasks = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('stat-tasks').innerText = dataStore.tasks.length;
            if(currentTab === 'tasks') renderList();
        });

        function updateAiSuggestions() {
            const recentPois = dataStore.pois.filter(p => p.type === 'WEED');
            if (recentPois.length > 0) {
                dataStore.ai = [{
                    id: 'ai-suggest-1',
                    name: "AI Suggestie: Onkruid Verwijderen",
                    desc: `Er zijn ${recentPois.length} nieuwe onkruidlocaties gemeld. Maak een route om deze te reinigen.`,
                    type: 'suggestion',
                    actionLabel: 'TAAK ACCEPTEREN'
                }];
            } else {
                dataStore.ai = [{
                    id: 'ai-idle',
                    name: "AI Agent Slaapt",
                    desc: "Geen nieuwe meldingen die actie vereisen.",
                    type: 'idle'
                }];
            }
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            const list = dataStore[currentTab];
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';

                let title = item.name || item.type || "Naamloos";
                let sub = item.desc || item.id;
                let badge = "";

                if(currentTab === 'tasks') {
                    badge = `<span class="status-badge" style="background:${item.status === 'open' ? '#4caf50' : '#9e9e9e'}">${item.status}</span>`;
                }

                div.innerHTML = `
                    <span class="item-title">${title}</span>
                    <span class="item-sub">${sub}</span>
                    ${badge}
                `;
                div.onclick = () => selectItem(item);
                container.appendChild(div);
            });
        }

        function updateMapMarkers() {
            clearMarkers();
            dataStore.pois.forEach(p => {
                if(p.latitude && p.longitude) {
                    const icon = p.type === 'WEED' ? weedIcon : alertIcon;
                    const m = L.marker([p.latitude, p.longitude], {icon}).addTo(map)
                        .bindPopup(`<b>${p.type}</b><br>${new Date(p.timestamp).toLocaleString()}`);
                    markers.push(m);
                }
            });
        }

        function selectItem(item) {
            const details = document.getElementById('details');
            details.style.display = 'block';
            document.getElementById('det-name').innerText = item.name || item.type || "Details";

            let content = "";
            if(currentTab === 'tasks') {
                content = `
                    <p>Status: <b>${item.status}</b></p>
                    <p>Aangemaakt: ${new Date(item.createdAt).toLocaleString()}</p>
                    <button onclick="deleteTask('${item.id}')" style="background:#f44336; color:white; border:none; padding:10px; width:100%; border-radius:5px;">Verwijder Taak</button>
                `;
            } else if(currentTab === 'pois') {
                content = `<p>Type: ${item.type}</p><p>Coördinaten: ${item.latitude}, ${item.longitude}</p>`;
                map.setView([item.latitude, item.longitude], 18);
            } else if(currentTab === 'ai' && item.type === 'suggestion') {
                content = `
                    <p>${item.desc}</p>
                    <button onclick="acceptAiSuggestion('${item.name}')" style="background:var(--secondary); color:white; border:none; padding:10px; width:100%; border-radius:5px;">${item.actionLabel}</button>
                `;
            }

            document.getElementById('det-content').innerHTML = content;
        }

        function acceptAiSuggestion(name) {
            db.collection("tasks").add({
                name: name,
                status: "open",
                createdAt: Date.now(),
                source: "AI_AGENT"
            });
            alert("AI Taak live verzonden naar app!");
            hideDetails();
        }

        function showTaskDialog() {
            const name = prompt("Taak omschrijving:");
            if(name) {
                db.collection("tasks").add({
                    name: name,
                    status: "open",
                    createdAt: Date.now()
                });
            }
        }

        function deleteTask(id) {
            if(confirm("Weet je het zeker?")) {
                db.collection("tasks").doc(id).delete();
                hideDetails();
            }
        }

        function hideDetails() { document.getElementById('details').style.display = 'none'; }
    </script>
</body>
</html>
